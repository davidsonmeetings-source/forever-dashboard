    const enc=new TextEncoder();
    const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(SALT),iterations:ITER,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(IV)},key,dec(CT));
    const html=new TextDecoder().decode(pt);
    try{sessionStorage.setItem('dpw',pw);}catch(e){}   // cache for the session so "refresh" doesn't re-prompt
    document.open();document.write(html);document.close();
  }catch(e){ if(auto){try{sessionStorage.removeItem('dpw');}catch(e2){}} else err.textContent='סיסמה שגויה'; }
}
document.getElementById('go').onclick=()=>unlock();
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
// auto-unlock from this session's cached password (seamless refresh)
try{var _s=sessionStorage.getItem('dpw');if(_s)unlock(_s);}catch(e){}
</script></body></html>

async function unlock(pwArg){
  const auto=pwArg!=null;
  const pw=auto?pwArg:document.getElementById('pw').value, err=document.getElementById('err');
  if(!auto)err.textContent='מפענח…';
  try{
    const enc=new TextEncoder();
    const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);

    document.open();document.write(html);document.close();
